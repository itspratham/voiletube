name: ViewTube CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_API_REPO: viewtube-prod-api
  ECS_CLUSTER: viewtube-prod-cluster
  ECS_SERVICE: viewtube-prod-api

jobs:
  # ─── Test Backend ────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: viewtube_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7
        options: --health-cmd "redis-cli ping" --health-interval 10s
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DEBUG: "True"
          DB_NAME: viewtube_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          USE_S3: "False"
        run: |
          cd backend
          python manage.py migrate
          python manage.py test --verbosity=2

  # ─── Test Frontend ───────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & lint
        run: |
          cd frontend
          npm ci
          npm run build

  # ─── Deploy to AWS ───────────────────────────────────────────────────────────
  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build & push backend image
      - name: Build and push API image
        id: build-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_API_REPO:latest
          docker push $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_API_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Build frontend and deploy to S3 + invalidate CloudFront
      - name: Build and deploy frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          npm ci
          npm run build
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # Run DB migrations via ECS task
      - name: Run migrations
        run: |
          aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition viewtube-prod-api \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET }}],securityGroups=[${{ secrets.ECS_SG }}]}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["python","manage.py","migrate","--noinput"]}]}' \
            --wait-for-stop

      # Update ECS service with new image
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE

      - name: Deployment summary
        run: |
          echo "✅ ViewTube deployed successfully!"
          echo "Image: ${{ steps.build-api.outputs.image }}"
          echo "Commit: ${{ github.sha }}"
